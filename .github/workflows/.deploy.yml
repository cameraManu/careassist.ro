name: Deploy CareAssist

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: careassist_r_usr
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Navigate to the specific project directory
            cd /var/www/careassist_r_usr/data/www/careassist.ro
            
            # 2. Pull the latest code
            git pull origin main
            
            # 3. Load Node environment (common for servers using NVM)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 4. Install dependencies and build the Next.js app
            npm install
            # npm run build
            
            # 5. Manage the process with PM2
            # Check if 'careassist' is already running
            if pm2 list | grep -q "careassist"; then
              echo "Restarting existing process..."
              pm2 restart careassist
            else
              echo "Starting new process..."
              pm2 start npm --name "careassist" -- start -- -p 3000
            fi
            
            # 6. Save PM2 list to ensure it starts on server reboot
            pm2 save