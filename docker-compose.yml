version: '3.8'

services:
  careassist-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careassist-prod
    restart: always
    ports:
      - "5000:5000"
    environment:
      # Connection to your external MariaDB
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=3306
      - NODE_ENV=production
    networks:
      - careassist-net

networks:
  careassist-net:
    driver: bridge
